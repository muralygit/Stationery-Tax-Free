name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Fix Gradle Wrapper
        run: |
          rm -f android/gradle/wrapper/gradle-wrapper.jar
          cd android
          gradle wrapper --gradle-version 8.13.0
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rename and Prepare APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk STFree-v1.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: STFree-v1-apk
          path: STFree-v1.apk
